# ─────────────────────────────────────────────────────────────────────────────
#  Memory AI – Netlify configuration
#  Landing page lives in the /landing folder.
#  Deploy: connect the GitHub repo at netlify.com, settings are auto-detected.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  publish = "landing"   # Only the landing/ folder is served as the site
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- landing/"

# ── Headers ───────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "no-referrer-when-downgrade"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Cache fonts (immutable)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images / icons
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Redirects ─────────────────────────────────────────────────────────────────
# Keep the app subdomain routing clean if you later add a /app SPA
[[redirects]]
  from   = "/app/*"
  to     = "https://app.dukiai.com/:splat"   # TODO: replace with real web app URL
  status = 301

# Legacy /download → scroll anchor on the landing page
[[redirects]]
  from   = "/download"
  to     = "/#download"
  status = 301

# ── Context-specific env for preview deploys ──────────────────────────────────
[context.deploy-preview]
  command = "echo 'preview deploy – no build step needed'"
