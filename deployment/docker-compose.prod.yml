version: "3.9"

# ─────────────────────────────────────────────────────────────
#  Memory AI — Production Docker Compose
#  DigitalOcean Droplet: Ubuntu 22.04, 4 GB RAM, 2 vCPU
# ─────────────────────────────────────────────────────────────

services:

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: memoryai_api
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../backend:/app
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy / SSL ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: memoryai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/options-ssl-nginx.conf:/etc/nginx/options-ssl-nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - web
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Certbot (Let's Encrypt) ──────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: memoryai_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run once, then cron handles renewal via deploy.sh
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h &
               wait $${!};
             done"

  # ── PostgreSQL + pgvector ────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memoryai_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caching / task queue) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: memoryai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: memoryai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

# ── Networks ───────────────────────────────────────────────────
networks:
  internal:          # Backend services only (not exposed)
    driver: bridge
    internal: true
  web:               # Nginx ↔ API ↔ external traffic
    driver: bridge
