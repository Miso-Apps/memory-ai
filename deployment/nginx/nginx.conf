# ─────────────────────────────────────────────────────────────────────────────
#  Nginx config for Memory AI
#  Place at:  deployment/nginx/nginx.conf
#  Reload with: docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api:10m     rate=60r/m;
limit_req_zone  $binary_remote_addr zone=auth:10m    rate=10r/m;

# ── Upstream FastAPI ──────────────────────────────────────────────────────────
upstream api_backend {
    server api:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect + ACME challenge ────────────────────────────────────
server {
    listen 80;
    server_name api.dukiai.com;

    # Allow Let's Encrypt ACME challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS API server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.dukiai.com;

    # ── SSL certificates (managed by Certbot) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.dukiai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dukiai.com/privkey.pem;
    include             /etc/nginx/options-ssl-nginx.conf;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "DENY" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── CORS preflight ────────────────────────────────────────────────────────
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With";
            add_header Access-Control-Max-Age       1728000;
            add_header Content-Type                 "text/plain charset=UTF-8";
            add_header Content-Length               0;
            return 204;
        }

        # ── Rate limit (general API) ──────────────────────────────────────────
        limit_req zone=api burst=20 nodelay;

        # ── Proxy to FastAPI ──────────────────────────────────────────────────
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # ── Timeouts (generous for AI calls) ─────────────────────────────────
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # ── Buffering (disable for streaming) ────────────────────────────────
        proxy_buffering     off;
        proxy_cache         off;

        client_max_body_size 50M;   # Allow voice / image uploads
    }

    # ── Stricter rate limit on auth endpoints ─────────────────────────────────
    location ~ ^/api/(auth|users/register|users/login) {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Streaming SSE endpoint ────────────────────────────────────────────────
    location /api/ai/stream {
        proxy_pass            http://api_backend;
        proxy_http_version    1.1;
        proxy_set_header      Connection     "";
        proxy_set_header      Host           $host;
        proxy_set_header      X-Real-IP      $remote_addr;
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    300s;
        chunked_transfer_encoding on;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass  http://api_backend;
        access_log  off;
    }
}
