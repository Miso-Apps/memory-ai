<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <rect width="128" height="128" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background rounded square: indigo → violet gradient -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Subtle top sheen for depth -->
  <rect width="128" height="68" fill="url(#sheen)" clip-path="url(#icon-clip)"/>

  <!--
    Brain outline: symmetric two-lobe shape traced clockwise from bottom-center.
    Coordinates are in the 128×128 viewBox.
  -->
  <path d="
    M 64 84
    C 58 90 50 88 48 86
    C 30 82 18 70 18 56
    C 18 40 30 28 46 28
    C 50 26 54 26 58 28
    C 60 24 62 22 64 22
    C 66 22 68 24 70 28
    C 74 26 78 26 82 28
    C 98 28 110 40 110 56
    C 110 70 98 82 80 86
    C 78 88 70 90 64 84
    Z"
    fill="none" stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Corpus callosum: subtle dashed center divider -->
  <line x1="64" y1="22" x2="64" y2="84"
    stroke="rgba(255,255,255,0.28)" stroke-width="2"
    stroke-dasharray="5 4" stroke-linecap="round"/>

  <!-- Neural connections (triangle) -->
  <line x1="42" y1="52" x2="86" y2="52"
    stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="52" x2="64" y2="70"
    stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="86" y1="52" x2="64" y2="70"
    stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Neural nodes: three white circles in a triangle formation -->
  <circle cx="42" cy="52" r="5.5" fill="white"/>
  <circle cx="86" cy="52" r="5.5" fill="white"/>
  <circle cx="64" cy="70" r="5.5" fill="white"/>
</svg>
