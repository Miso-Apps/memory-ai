<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="icon-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="icon-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="icon-clip">
      <rect width="256" height="256" rx="54"/>
    </clipPath>
  </defs>

  <!-- Dark background (matches app.json splash backgroundColor) -->
  <rect width="1284" height="2778" fill="#121212"/>

  <!--
    Icon group (256×256) centered: x = (1284-256)/2 = 514, y = (2778-256)/2 - 100 = 1111
    Scale factor from 128 design: 256/128 = 2.0
  -->
  <g transform="translate(514, 1111)">
    <rect width="256" height="256" rx="54" fill="url(#icon-bg)"/>
    <rect width="256" height="136" fill="url(#icon-sheen)" clip-path="url(#icon-clip)"/>
    <!-- Brain outline (128 coords × 2) -->
    <path d="
      M 128 168
      C 116 180 100 176 96 172
      C 60 164 36 140 36 112
      C 36 80 60 56 92 56
      C 100 52 108 52 116 56
      C 120 48 124 44 128 44
      C 132 44 136 48 140 56
      C 148 52 156 52 164 56
      C 196 56 220 80 220 112
      C 220 140 196 164 160 172
      C 156 176 140 180 128 168
      Z"
      fill="none" stroke="white" stroke-width="11"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center dashed line -->
    <line x1="128" y1="44" x2="128" y2="168"
      stroke="rgba(255,255,255,0.28)" stroke-width="4"
      stroke-dasharray="10 8" stroke-linecap="round"/>
    <!-- Connections -->
    <line x1="84" y1="104" x2="172" y2="104"
      stroke="rgba(255,255,255,0.45)" stroke-width="5" stroke-linecap="round"/>
    <line x1="84" y1="104" x2="128" y2="140"
      stroke="rgba(255,255,255,0.45)" stroke-width="5" stroke-linecap="round"/>
    <line x1="172" y1="104" x2="128" y2="140"
      stroke="rgba(255,255,255,0.45)" stroke-width="5" stroke-linecap="round"/>
    <!-- Neural nodes -->
    <circle cx="84" cy="104" r="11" fill="white"/>
    <circle cx="172" cy="104" r="11" fill="white"/>
    <circle cx="128" cy="140" r="11" fill="white"/>
  </g>

  <!-- App name -->
  <text x="642" y="1430"
    text-anchor="middle"
    font-family="-apple-system, 'Helvetica Neue', sans-serif"
    font-size="64" font-weight="700" fill="white"
    letter-spacing="-1.5">Memory AI</text>

  <!-- Tagline -->
  <text x="642" y="1510"
    text-anchor="middle"
    font-family="-apple-system, 'Helvetica Neue', sans-serif"
    font-size="34" font-weight="400" fill="rgba(255,255,255,0.45)">
    Your second brain
  </text>
</svg>
